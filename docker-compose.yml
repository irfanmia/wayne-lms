services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: wayne
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/wayne
      POSTGRES_PASSWORD: postgres
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      - db
      - redis
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  celery:
    build: ./backend
    command: celery -A config worker -l info
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/wayne
      POSTGRES_PASSWORD: postgres
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  frontend:
    image: node:20
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app
    command: sh -c "npm install && npm run dev"

volumes:
  pgdata:
